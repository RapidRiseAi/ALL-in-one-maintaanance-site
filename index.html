<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All-in-One Maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(14, 165, 233, 0.32), transparent 36rem),
          linear-gradient(135deg, #0f172a 0%, #111827 55%, #1e293b 100%);
      }

      main {
        width: min(92vw, 760px);
        padding: 3rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.35);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.14);
        color: #86efac;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.35rem, 6vw, 4.5rem);
        line-height: 1;
      }

      p {
        margin: 0 auto;
        max-width: 42rem;
        color: #cbd5e1;
        font-size: 1.125rem;
        line-height: 1.7;
      }

      .next-step {
        margin-top: 2rem;
        padding: 1rem 1.25rem;
        border-radius: 16px;
        background: rgba(14, 165, 233, 0.12);
        color: #bae6fd;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Ready for Cloudflare Pages</span>
      <h1>All-in-One Maintenance</h1>
      <p>
        This placeholder landing page gives Cloudflare Pages a static entry point to build and deploy while the full site is being prepared.
      </p>
      <div class="next-step">Connect this repo in Cloudflare Pages and deploy from the repository root.</div>
    </main>
  </body>
</html>
