# Cloudflare Workers — static-assets-only deployment.
# This site is plain HTML/CSS/JS, so we serve the ./public folder as static
# assets (no Worker script needed). `name` must match the connected Worker
# service. The Cloudflare build runs `npx wrangler versions upload`, which
# reads this config for the assets directory.
name = "all-in-one-maintenance-site"
compatibility_date = "2025-01-01"

# Enable the production *.workers.dev URL (used by `wrangler deploy` on the
# production branch) and per-version Preview URLs (used by non-production /
# PR-branch builds that run `wrangler versions upload`). Without these there
# is no clickable URL for the uploaded version.
workers_dev = true
preview_urls = true

[assets]
directory = "./public"
