<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- ===== Brand emblem ===== -->
  <symbol id="i-logo" viewBox="0 0 64 64">
    <defs>
      <linearGradient id="logoOrange" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FBB03B"/><stop offset="1" stop-color="#E07B00"/>
      </linearGradient>
      <linearGradient id="logoSteel" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3A424E"/><stop offset="1" stop-color="#1C2027"/>
      </linearGradient>
    </defs>
    <!-- gear ring -->
    <g fill="url(#logoSteel)">
      <circle cx="32" cy="32" r="29"/>
    </g>
    <g fill="#2A313B">
      <circle cx="32" cy="32" r="24"/>
    </g>
    <!-- gear teeth -->
    <g fill="url(#logoSteel)">
      <rect x="29.5" y="1" width="5" height="7" rx="1"/>
      <rect x="29.5" y="56" width="5" height="7" rx="1"/>
      <rect x="56" y="29.5" width="7" height="5" rx="1"/>
      <rect x="1" y="29.5" width="7" height="5" rx="1"/>
      <rect x="48" y="9" width="5" height="7" rx="1" transform="rotate(45 50.5 12.5)"/>
      <rect x="11" y="48" width="5" height="7" rx="1" transform="rotate(45 13.5 51.5)"/>
      <rect x="48" y="48" width="5" height="7" rx="1" transform="rotate(-45 50.5 51.5)"/>
      <rect x="11" y="9" width="5" height="7" rx="1" transform="rotate(-45 13.5 12.5)"/>
    </g>
    <!-- shield -->
    <path d="M32 11l16 6v11c0 11-7 18-16 22-9-4-16-11-16-22V17z" fill="url(#logoOrange)"/>
    <path d="M32 15l12 4.5V28c0 8.4-5.2 14-12 17.4C25.2 42 20 36.4 20 28v-8.5z" fill="#1C2027"/>
    <!-- roof -->
    <path d="M24 27l8-6 8 6v2l-8-5.6L24 29z" fill="url(#logoOrange)"/>
    <!-- crossed wrench + hammer -->
    <g stroke="#E9EDF2" stroke-width="2.4" stroke-linecap="round" fill="none">
      <path d="M27 41l8-8"/>
      <path d="M37 41l-8-8"/>
    </g>
    <circle cx="26.5" cy="41.5" r="2.4" fill="url(#logoOrange)"/>
    <circle cx="37.5" cy="41.5" r="2.4" fill="#E9EDF2"/>
  </symbol>

  <!-- ===== UI / contact ===== -->
  <symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.5 2.1L8 9.8a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.7 2.1z"/>
  </symbol>
  <symbol id="i-whatsapp" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.7-.6-3-1.3-4.9-4.3-5.1-4.5-.1-.2-1.2-1.5-1.2-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.1.1.3 0 .5l-.4.5-.3.3c-.2.2-.3.4-.2.6.2.4.9 1.5 1.9 2.3 1.3 1.1 2.3 1.5 2.6 1.6.2.1.4.1.6-.1l.8-1c.2-.2.3-.2.6-.1l2 .9c.3.1.4.2.5.3.1.2.1.7-.1 1.4z"/>
  </symbol>
