  <symbol id="i-fence" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V6l2-2 2 2v15M14 21V6l2-2 2 2v15"/><path d="M3 10h18M3 15h18"/></symbol>
  <symbol id="i-window" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3.5" width="16" height="17" rx="1.5"/><path d="M12 3.5v17M4 12h16"/></symbol>
  <symbol id="i-washer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2.5" width="14" height="19" rx="2"/><circle cx="12" cy="14" r="4.5"/><path d="M9.2 14a2.8 2.8 0 0 1 5.6 0"/><circle cx="8.5" cy="6" r=".6" fill="currentColor" stroke="none"/><circle cx="11" cy="6" r=".6" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-certificate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="13" rx="2"/><path d="M7 7.5h10M7 11h6"/><circle cx="12" cy="18.5" r="2.5"/><path d="M10.5 20.5L9.5 23l2.5-1.3L14.5 23l-1-2.5"/></symbol>
