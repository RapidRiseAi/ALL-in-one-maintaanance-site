  <symbol id="i-tools" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0 5.3 5.2l-2 2-7-7 2-2a4 4 0 0 0 1.7 1.8z"/><path d="M5.5 5.5l4 4M4 7l3-3 2 1-2 2zM14 14l5 5a2 2 0 0 1-3 3l-5-5z"/></symbol>
