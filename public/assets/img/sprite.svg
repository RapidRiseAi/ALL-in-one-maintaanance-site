  <symbol id="i-flame" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-1.6.7-2.9 1.4-3.8C9 9 9.5 10 10.5 10c.8 0 1-.7 1-1.5 0-2.5.5-4.5.5-6.5z"/></symbol>
  <symbol id="i-wrench" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0 5.3 5.2L13 18.5a2.8 2.8 0 0 1-4-4l6.7-6.7z"/><path d="M14.7 6.3l3-3a4 4 0 0 0-3.6 1"/></symbol>
